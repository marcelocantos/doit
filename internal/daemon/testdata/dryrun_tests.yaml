# Server fixture: capabilities and rules available for all tests.
capabilities:
  - name: echo
    tier: read
  - name: upper
    tier: read
  - name: deploy
    tier: write
  - name: noisy
    tier: read

rules:
  noisy:
    reject_flags: ["--force"]

# Test cases.
tests:
  - name: read-only command allowed
    args: [echo, hello]
    expect:
      segments: [echo]
      tiers: [read]
      decision: allow
      level: 1
      rule: allow-safe-pipeline

  - name: denied by config rule
    args: [echo, hello, "＆＆", noisy, --force]
    expect:
      segments: [echo, noisy]
      tiers: [read, read]
      decision: deny
      level: 1
      rule: deny-noisy-flags

  - name: write-tier escalates
    args: [deploy, prod]
    expect:
      segments: [deploy]
      tiers: [write]
      decision: escalate
      level: 2
      reason_contains: no learned policy

  - name: pipeline multiple segments
    args: [echo, data, "¦", upper]
    expect:
      segments: [echo, upper]
      tiers: [read, read]
      decision: allow
      level: 1

  - name: unknown capability
    args: [nonexistent]
    expect:
      not_evaluated: true

  - name: compound and-then both read
    args: [echo, foo, "＆＆", echo, bar]
    expect:
      segments: [echo, echo]
      tiers: [read, read]
      decision: allow
      level: 1
