  T20:
    name: Per-subcommand tier helpers and unreachable Capability.Run() methods are deleted; tiers become advisory metadata only
    status: identified
    value: 8.0
    cost: 2.0
    observable: true
    acceptance:
    - gitSubcommandTier() is deleted from internal/cap/builtin/git.go
    - goSubcommandTier() is deleted from internal/cap/builtin/go_cmd.go
    - Capability.Run() methods that were only reachable via the defunct pipeline parser are deleted
    - The cap.Capability interface's Run() method is removed OR downgraded to a stub that panics 'unreachable under MCP-first architecture', with a comment explaining that execution goes through engine.runShellCommand via sh -c
    - Tiers remain as advisory metadata on the Capability interface for doit_list_capabilities display and for the 'disable dangerous tier entirely' config switch (cfg.Tiers.Dangerous)
    - Tiers are NOT consulted during per-command policy evaluation — engine.evaluatePolicy does not call c.Tier() to gate allow/deny decisions
    - doit_list_capabilities output still shows tier classifications for each capability
    - 'The ''disable dangerous tier'' config gate still works: when cfg.Tiers.Dangerous is false, capabilities marked dangerous do not appear in doit_list_capabilities and any L1 rule that references them reports ''tier disabled in config'''
    - 'All tests still pass after the deletion: go vet ./..., go test ./..., go build ./...'
    context: |-
      The pre-T17 framing of this target ("add EffectiveTier(args []string) so git push becomes dangerous at eval time") assumed tiers drove policy decisions. Under the T17 architectural shift (engine treats commands as opaque strings, tiers are not consulted per-command), the EffectiveTier idea is obsolete — you don't need per-subcommand tiers in the engine path if the engine isn't using tiers at all.

      What's left is the dead-code cleanup:

        - `gitSubcommandTier()` in `internal/cap/builtin/git.go:41-56` — maps commit→write, push→dangerous, unknown→dangerous. Only called from `Git.Run()`, which is never invoked because execution goes through `engine.runShellCommand()` via `sh -c`. Delete.
        - `goSubcommandTier()` in `internal/cap/builtin/go_cmd.go:39-49` — same story for go install/run/generate → dangerous, build/test/vet → build. Delete.
        - `Capability.Run()` implementations that were only reached via the pipeline parser — delete them or downgrade to a stub with a panic("unreachable under MCP-first architecture") so any future regression to a parser-based path surfaces immediately.

      Tiers themselves stay as metadata for:
        - `doit_list_capabilities` display (users and agents want to see what's classified as read/write/dangerous)
        - The `cfg.Tiers.Dangerous` coarse config gate ("disable dangerous tier entirely") which operates at the capability-level, not per-command
        - Future L1 Starlark rules that want to reference tier as a label in their own reasoning

      This target can only land AFTER 🎯T17 is merged, because T17's deletion of `policy.Segment.Tier` is the upstream change. Sequence: T17 → T20.

      Tags: cleanup, architecture
    depends_on:
    - T17
    tags:
    - security
    - capabilities
    - critical
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
  T21:
    name: Executed commands log parsed segments and tiers to the audit log
    status: achieved
    value: 5.0
    cost: 2.0
    acceptance:
    - A doit_execute of 'cat foo | wc -l' produces an audit entry with segments=[cat,wc] and tiers=[read,read]
    - A doit_execute of 'git status' produces segments=[git]
    - Existing dry-run audit entries remain unchanged
    context: 'In the audit log, dry_run entries populate segments and tiers, but execute entries (e.g. seq 46-47 from the experimentation session) have segments: null, tiers: null. Root cause: runShellCommand (engine.go:1152) calls logExecution with nil segments/tiers (line 1188). evaluatePolicy already computes segments and tiers — they should be threaded through to logExecution so execute entries match dry_run entries for forensic analysis.'
    tags:
    - audit
    - observability
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
    achieved: 2026-04-12
  T22:
    name: Sessions can be started with L1/L2-only configurations
    status: identified
    value: 3.0
    cost: 2.0
    acceptance:
    - doit_session_start succeeds when L3 is disabled
    - Sessions group audit-log entries by session ID regardless of L3 status
    - L3-specific session features (context accumulation) degrade gracefully when L3 is off, without blocking the session itself
    context: Currently doit_session_start returns `L3 policy engine not available; sessions require L3`. Sessions have value beyond L3 context accumulation — they scope audit entries, give intent/description to a group of commands, and provide a natural unit for retrospective review. Decoupling session lifecycle from L3 availability lets users run doit with L1/L2 only and still get session-structured audit history.
    tags:
    - sessions
    - ux
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
  T23:
    name: Unknown capabilities are rejected or escalated, not silently defaulted to TierRead
    status: achieved
    value: 13.0
    cost: 2.0
    observable: true
    acceptance:
    - dry_run of 'echo hello' does NOT return allow L1 'all segments are read-only' (echo is not a registered capability)
    - dry_run of 'curl https://example.com' does NOT return allow L1 'all segments are read-only'
    - Default behaviour for unknown caps is escalate (so L2/L3 can reason) or deny (if L3 is off); neither silently grants TierRead
    - 'The error message or escalation reason names the missing capability: ''unknown capability: echo — register it in internal/cap/builtin/ or write a Starlark rule'''
    - A test in engine_test.go covers the unknown-capability path via the engine, not via direct policy.Level1 construction
    context: |-
      **v0.5.0 regression on top of the original bug**: dry_run of `echo hello` now returns `allow (Level 1) Rule: allow-safe-pipeline, Tiers: [read]`. Root cause: `engine.evaluatePolicy` defaults `tier := cap.TierRead` before the `reg.Lookup(capName)` call, and only overrides `tier` if the lookup succeeds. When the lookup fails, the request proceeds with Segments: [{CapName: echo, Tier: read}], which checkSafePipeline happily auto-allows.

      This is a second L1 bypass surface distinct from 🎯T17 — even a command with no shell metacharacters gets auto-allowed if its first word is any unknown identifier. Combined with T17, the L1 auto-allow rule currently greenlights ANY command starting with ANY word, as long as no registered-capability flag rule intervenes.

      Fix options (pick one):
        (a) Default to `cap.TierDangerous` when Lookup fails — forces escalation to L2/L3.
        (b) Return a synthetic Deny result from evaluatePolicy with a clear "unknown capability: $name" reason, so the dry_run output explains the decision.

      Option (b) is more user-friendly. Either way, the checkSafePipeline rule must not treat a defaulted-to-read tier as genuine read.

      Related to 🎯T17 but should land as a separate commit — the fix touches evaluatePolicy tier defaulting, not the metacharacter check.

      Tags: security, level1, critical, bypass, ux
    tags:
    - ux
    - error-messages
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
    achieved: 2026-04-12
  T24:
    name: Capability Validate() rejects shell metacharacters in arguments
    status: achieved
    value: 8.0
    cost: 3.0
    acceptance:
    - ls.Validate() rejects args containing |, &, ;, >, <, $, `, \n
    - All capability Validate() methods share a common rejection helper
    - dry_run of 'ls -la | xargs rm -rf' is denied even if the tokenizer fix for 🎯T17 regresses
    - A test case covers each metacharacter
    context: |-
      Defense in depth: even once 🎯T17 correctly tokenizes shell metacharacters, individual capabilities currently accept ANY args — internal/cap/builtin/ls.go:20 has `func (l *Ls) Validate(args []string) error { return nil }`. This means if the tokenizer ever misses an edge case (unusual quoting, tab-separated operators, newline-embedded commands), junk args flow straight to sh -c. Capabilities should reject obviously-dangerous substrings in their args as a second line of defense.

      A shared helper in internal/cap/validate.go — `RejectShellMetacharacters(args []string) error` — can be called from every capability's Validate(). It should reject: | & ; < > ( ) ` $ \n \r and unbalanced quotes. Commands that need literal metacharacters can bypass via Starlark rules or L3 approval.

      This target is a safety net, not a primary fix. It makes 🎯T17 more robust.
    tags:
    - security
    - capabilities
    - defense-in-depth
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
    achieved: 2026-04-12
  T25:
    name: deny-rm-catastrophic covers system directories and glob paths
    status: identified
    value: 3.0
    cost: 2.0
    acceptance:
    - dry_run of 'rm -rf /usr' denied
    - dry_run of 'rm -rf /etc' denied
    - dry_run of 'rm -rf /bin' denied
    - dry_run of 'rm -rf /Users' denied
    - dry_run of 'rm -rf /*' denied (glob)
    - dry_run of 'rm -rf ~root' or '~otheruser' denied
    - Existing positive tests for '/', '.', '..', '~', '~/...' still pass
    context: |-
      **Partial coverage in v0.5.0 via L3.** Verified by dry_run 2026-04-12: both `rm -rf /*` and `rm -rf /usr` are denied at Level 3 by the llm-gatekeeper-session-fast rule, with clear reasoning about system-wide destruction. The L3 LLM catches the general class even though the L1 `deny-rm-catastrophic` rule only matches literal `/`, `.`, `..`, `~`, `~/...`.

      **Remaining gap**: L3 is not an acceptable safety net because (a) it depends on `policy.level3_enabled=true`, which the user can turn off, (b) it's non-deterministic — a different prompt or model revision could decide differently, and (c) catastrophic-rm is the textbook case for a hardcoded L1 rule, not a request for LLM judgment. The L1 `deny-rm-catastrophic` rule (`internal/policy/level1.go:186-218`) still needs extending to cover:
        - glob expansion: any arg containing an unescaped `*` combined with `-r`/`-R`
        - absolute system paths: `/usr`, `/etc`, `/bin`, `/sbin`, `/lib`, `/lib64`, `/System`, `/Library`, `/Users`, `/home`, `/var`, `/opt`, `/boot`, `/dev`, `/proc`, `/sys`
        - other-user home dirs: `~root`, `~someone` (any `~` followed by a non-`/` character)

      Maintain the blacklist as a package-level constant so it's easy to review and extend. Existing positive tests for `/`, `.`, `..`, `~`, `~/...` must continue to pass.

      Independent of 🎯T17 — this target is a specific L1 pattern rule, which is exactly the shape of L1 under the new architecture. It can land in parallel with T17 since they touch different rules in `internal/policy/level1.go` (T17 deletes `checkSafePipeline`, T25 extends `checkRmCatastrophic`). Minor merge-conflict risk on the level1.go rule registration list; resolvable mechanically.

      Value downgraded from 5 to 3 because L3 already catches the worst cases, but not retired — defense in depth matters and L3 coverage is not contractual.
    tags:
    - security
    - rules
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
