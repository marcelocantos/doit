  T20:
    name: git and go subcommand effective tier is computed at policy-evaluation time via Capability.EffectiveTier(args)
    status: identified
    value: 13.0
    cost: 3.0
    observable: true
    acceptance:
    - dry_run of 'git commit -m x' reports tier write (not read)
    - dry_run of 'git push' reports tier dangerous (not read)
    - dry_run of 'git push --force' is denied by deny-git-push-flags OR dangerous-tier escalation — whichever fires first
    - dry_run of 'git status' still reports tier read
    - dry_run of 'go install ./cmd/doit' reports tier dangerous (not build)
    - dry_run of 'go run ./cmd' reports tier dangerous
    - dry_run of 'go test ./...' still reports tier build
    - dry_run of 'go vet ./...' still reports tier build
    - The cap.Capability interface gains an `EffectiveTier(args []string) Tier` method with a default implementation that returns Tier()
    - Git and GoCmd override EffectiveTier to route through gitSubcommandTier() / goSubcommandTier() — those helpers become live code, not vestigial
    - engine.evaluatePolicy uses EffectiveTier(args[1:]) to populate policy.Segment.Tier so the correct tier reaches L1/L2 rules
    - A regression test in internal/policy/level1_test.go or engine_test.go verifies tier-per-subcommand via the engine path, not via capability.Run() (which is unreachable)
    context: |-
      Verified on v0.5.0 by dry_run in the 2026-04-12 session:
        - `git push` (bare, no --force) → allow L1 "all segments are read-only", Tiers: [read]
        - `go install ./cmd/doit` → L3 allows as build tier (wrong — should be dangerous; L3 only happened to agree because it's in-scope for the session)

      Root cause unchanged from the original context: `gitSubcommandTier()` in `internal/cap/builtin/git.go` and `goSubcommandTier()` in `internal/cap/builtin/go_cmd.go` correctly classify per-subcommand tiers (commit→write, push→dangerous, install/run/generate→dangerous, build/test/vet→build), but they are **dead code** under the MCP-first architecture. Execution goes through `engine.runShellCommand()` via `sh -c`, not through `Capability.Run()`, so the per-subcommand tier is never consulted. The policy path in `engine.evaluatePolicy` (engine.go, around the `capName := args[0]; tier := c.Tier()` section) uses the capability's BASE tier — TierRead for git, TierBuild for go — which is wrong for non-read git subcommands and for the destructive go subcommands.

      Fix: add `EffectiveTier(args []string) cap.Tier` to the `cap.Capability` interface, with a default that just returns `Tier()`. Override on `Git` and `GoCmd` to delegate to the existing helpers. Wire `evaluatePolicy` to call `EffectiveTier(args[1:])` when constructing `policy.Segment`. The dead code in `Git.Run()` / `GoCmd.Run()` (which is unreachable) can be deleted as part of the same change since its logic lives in the helper functions already.

      Note: git push --force is still caught by the config rule `deny-git-push-flags` in level1.go even without this fix, because that rule matches on flag presence regardless of the computed tier. T20 is about the bare subcommand (git push, git commit, go install) where no flag rule helps.

      Tags: security, capabilities, critical, bypass
    tags:
    - security
    - capabilities
    - critical
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
  T21:
    name: Executed commands log parsed segments and tiers to the audit log
    status: identified
