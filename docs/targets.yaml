    origin: roadmap — docs/todo.md Gatekeeper Capabilities
    discovered: 2026-04-10
    achieved: 2026-04-11
  T16:
    name: doit is the sole execution path — agents have no direct Bash access
    status: achieved
    value: 8.0
    cost: 2.0
    acceptance:
    - Documentation and agents-guide instruct agents to use only doit_execute
    - Claude Code permission config denies Bash and routes through doit MCP tools
    - Worker CLAUDE.md audit tool verifies doit routing is configured correctly
    - Agents that attempt direct Bash are detected and flagged
    context: The entire security model depends on doit being the sole execution path. If an agent can bypass doit via direct Bash, all policy enforcement is theatre. This is about ensuring the deployment configuration enforces the architecture.
    tags:
    - safety
    - deployment
    origin: roadmap — design doc core principle
    discovered: 2026-04-10
    achieved: 2026-04-11
  T17:
    name: L1 refuses to auto-allow any command that contains shell composition metacharacters
    status: identified
    value: 20.0
    cost: 8.0
    observable: true
    acceptance:
    - dry_run of 'ls && rm -rf /' is NOT allowed by allow-safe-pipeline (must escalate or deny)
    - dry_run of 'ls; rm -rf /tmp/x' is NOT allowed by allow-safe-pipeline
    - dry_run of 'cat foo | tee bar' is NOT allowed by allow-safe-pipeline (presence of `|` alone means composition the engine cannot reason about)
    - dry_run of 'cat /etc/passwd > /tmp/stolen' is NOT allowed by allow-safe-pipeline
    - dry_run of 'ls $(rm -rf /)' is NOT allowed by allow-safe-pipeline
    - dry_run of 'ls `rm -rf /`' is NOT allowed by allow-safe-pipeline
    - 'dry_run of bare read commands still auto-allows: ''ls'', ''git status'', ''cat foo'', ''grep -r TODO .'''
    - Quoted metacharacters inside a single argument are handled sanely — `grep '&&' file` is still a single-segment read command (stretch goal; acceptable to deny initially and revisit)
    - A regression test suite exists in internal/policy/level1_test.go (or similar) exercising every bypass listed above, and `go test ./...` passes
    context: |-
      Post-v0.5.0, doit deliberately does NOT tokenize commands at the engine level — composition is delegated to the shell via `sh -c`. This was the right call for composition semantics, but it leaves `internal/policy/level1.go:251-266 checkSafePipeline` unsound: the rule iterates `req.Segments` and auto-allows if every segment is TierRead, but `engine/engine.go evaluatePolicy` always constructs `req.Segments` with exactly one element (the first token of the command) regardless of what else is in the string. So "all segments are read-only" is vacuously true for any command whose first word is a read-tier capability.

      Confirmed bypasses on v0.5.0 (verified by dry_run in the 2026-04-12 session):
        - `ls && rm -rf /` → allow L1, Rule: allow-safe-pipeline, Segments: [ls]
        - `cat /etc/passwd > /tmp/stolen` → allow L1, Rule: allow-safe-pipeline, Segments: [cat]
        - `ls $(rm -rf /)` → allow L1, Rule: allow-safe-pipeline, Segments: [ls]
        - `git push` (no flags) → allow L1, Rule: allow-safe-pipeline, Segments: [git]
        - `echo hello` → allow L1 (unknown capability defaults to TierRead in evaluatePolicy, see 🎯T23)

      Fix: tighten checkSafePipeline to refuse auto-allow whenever the raw command string contains any shell metacharacter the engine did not parse. Specifically, bail out (return nil to fall through to L2/L3) if req.Command contains any of: `&&`, `||`, `;`, `|`, `>`, `<`, `` ` ``, `$(`, `${`, `$[`, `&` (background), `(`, `)`, newline, CR. Commands with quoted metacharacters (`grep '&&' file`) are a known edge case — the simplest correct behaviour is to deny-then-escalate on any metacharacter, then let L2/L3 approve the quoted case. Revisit the edge case after the bypass is closed.

      This fix does NOT re-introduce a tokenizer. It treats shell metacharacters as "I can't reason about this at L1, escalate" — consistent with the v0.5.0 "shell handles composition" model. T18 (redirects), T19 (command substitution), and T24 (capability-level Validate) are all subsumed by this single change — the same metacharacter rejection covers `>`, `$(`, and friends.

      Tags: security, level1, critical, bypass
    tags:
    - security
    - parser
    - critical
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
  T18:
    name: Output redirection (&gt;, &gt;&gt;, &amp;&gt;) is recognized as a write operation
    status: identified
    value: 13.0
    cost: 3.0
    acceptance:
    - dry_run of 'cat /etc/passwd > /tmp/stolen' requires TierWrite
    - dry_run of 'ls >> log.txt' requires TierWrite
    - dry_run of 'cmd &> log' requires TierWrite
    - A test case covers each redirect form
    context: |-
      Subsumed by 🎯T17. Output redirection (`>`, `>>`, `&>`) is a shell metacharacter that the v0.5.0 engine cannot reason about — the correct behaviour is to refuse the L1 auto-allow and escalate to L2/L3, exactly as T17 prescribes. The original framing (enforce TierWrite on redirects) predates the pipeline-parser removal and is no longer the right shape.

      Keep this target as a verify-level check that once T17 lands, the specific redirect forms are denied: `cat /etc/passwd > /tmp/stolen`, `ls >> log.txt`, `cmd &> log`. If T17's regression suite already covers these, this target can be retired.
    depends_on:
    - T17
    tags:
    - security
    - parser
    - critical
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
