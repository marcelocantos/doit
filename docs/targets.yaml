schema_version: 1
targets:
  T1:
    name: MCP-first architecture
    status: achieved
    value: 5.0
    cost: 1.0
    acceptance:
    - TODO
    origin: manual
    discovered: 2026-04-09
  T10:
    name: L3→L2 auto-promotion detects stable patterns from decision history
    status: achieved
    value: 3.0
    cost: 3.0
    acceptance:
    - Semantic similarity grouping clusters similar L3 decisions (e.g., go test ./... variants)
    - Conditional branching detection identifies same command approved/denied based on different flags
    - Stable L3 patterns are proposed as L2 entries for human approval via elicitation
    - Auto-promotion runs after L3 decisions (tryPromote already exists, needs elicitation integration)
    context: The claudia session (🎯T8) can analyse L3 decision history for patterns. Instead of simple audit log analysis, the agent uses semantic understanding to cluster similar decisions and propose L2 entries. Runs as a periodic task within the existing claudia session.
    tags:
    - policy
    - claudia
    origin: roadmap — docs/todo.md Policy Migration
    discovered: 2026-04-10
    achieved: 2026-04-11
  T11:
    name: Spaced repetition review keeps learned policy fresh
    status: achieved
    value: 3.0
    cost: 2.0
    acceptance:
    - L2 entries have ReviewSchedule with next_review dates
    - Overdue entries are surfaced via doit_policy_status or a dedicated review tool
    - 'Review elicitation presents the entry and asks: keep, modify, or remove'
    - Review intervals use spaced repetition (increasing intervals after each confirmation)
    context: 'L2 entries have ReviewSchedule fields but review is never triggered. Without periodic review, learned policy accumulates stale entries that don''t reflect current project reality. Design doc section: Spaced Repetition Review.'
    tags:
    - policy
    origin: roadmap — design doc
    discovered: 2026-04-10
    achieved: 2026-04-11
  T12:
    name: Gatekeeper self-audit detects dangerous rule combinations and drift
    status: achieved
    value: 2.0
    cost: 3.0
    acceptance:
    - Periodic audit detects rules that are dangerous in combination
    - Flags rules that have drifted from current project reality
    - Identifies L3 patterns that should have been promoted but weren't
    - Surfaces inconsistencies between L1 Starlark rules and L2 learned entries
    context: The claudia session (🎯T8) can perform holistic rule set review. The agent reads all L1 Starlark rules and L2 entries, reasons about interactions, and flags dangerous combinations or drift. Runs as a periodic or on-demand task.
    tags:
    - policy
    - safety
    - claudia
    origin: roadmap — docs/todo.md Gatekeeper Self-Audit
    discovered: 2026-04-10
    achieved: 2026-04-11
  T13:
    name: Project context auto-discovery informs policy decisions
    status: achieved
    value: 3.0
    cost: 2.0
    acceptance:
    - Engine discovers project type from Makefile, go.mod, package.json, etc.
    - Project context influences L1/L2 evaluation (e.g., Go project allows go test)
    - CLAUDE.md is parsed for doit-relevant configuration hints
    - Context is passed to L3 for informed reasoning about command safety
    context: 'Currently doit treats all commands the same regardless of project context. A Go project should auto-allow go test, a Node project should allow npm test. Per-project config handles explicit rules but auto-discovery handles the common case. Design doc section: Global vs Repo-Level Policy.'
    tags:
    - policy
    - context
    origin: roadmap — docs/todo.md Global vs Repo-Level Policy
    discovered: 2026-04-10
    achieved: 2026-04-11
  T14:
    name: Session-scoped gatekeeper uses claudia for context-aware triage
    status: achieved
    value: 5.0
    cost: 3.0
    acceptance:
    - Worker can introduce a work session via doit_execute metadata (scope, description)
    - Session context persists across evaluations within a declared work session (no /clear)
    - Session agent makes faster, more informed decisions using accumulated work context
    - Session agent can pre-approve patterns within the declared scope
    - Session ends on worker signal or timeout, resuming per-command /clear behavior
    context: 'With L3 already running as a persistent claudia session (🎯T8), the session agent becomes an extension: workers can introduce a work session with scope/description, and the existing claudia session accumulates that context across evaluations (skip /clear for within-session commands). This builds on top of the L3 claudia integration rather than being a separate system.'
    tags:
    - policy
    - agent
    - claudia
    origin: roadmap — docs/todo.md Gatekeeper Capabilities
    discovered: 2026-04-10
    achieved: 2026-04-11
  T15:
    name: Gatekeeper has read-only repo access for claim verification
    status: achieved
    value: 2.0
    cost: 2.0
    acceptance:
    - Gatekeeper can read .gitignore to verify 'generated directory' claims
    - Gatekeeper can read build config to verify build-related command justifications
    - Read-only access is enforced — gatekeeper cannot modify the repo
    - Hardcoded allowlist governs which files the gatekeeper can read
    context: When an agent claims 'this directory is generated, safe to delete', the gatekeeper currently takes it at face value. With repo access, it can verify claims against .gitignore, build configs, etc.
    tags:
    - policy
    - safety
    origin: roadmap — docs/todo.md Gatekeeper Capabilities
    discovered: 2026-04-10
    achieved: 2026-04-11
  T16:
    name: doit is the sole execution path — agents have no direct Bash access
    status: achieved
    value: 8.0
    cost: 2.0
    acceptance:
    - Documentation and agents-guide instruct agents to use only doit_execute
    - Claude Code permission config denies Bash and routes through doit MCP tools
    - Worker CLAUDE.md audit tool verifies doit routing is configured correctly
    - Agents that attempt direct Bash are detected and flagged
    context: The entire security model depends on doit being the sole execution path. If an agent can bypass doit via direct Bash, all policy enforcement is theatre. This is about ensuring the deployment configuration enforces the architecture.
    tags:
    - safety
    - deployment
    origin: roadmap — design doc core principle
    discovered: 2026-04-10
    achieved: 2026-04-11
  T17:
    name: Engine treats commands as opaque strings; commands that match no specific L1 rule escalate to L2/L3
    status: identified
    value: 20.0
    cost: 5.0
    observable: true
    acceptance:
    - checkSafePipeline is deleted from internal/policy/level1.go; there is no engine-level rule that auto-allows based on 'all segments are read-only' reasoning
    - policy.Segment.Tier is no longer populated by engine.evaluatePolicy; the policy.Request carries the raw command string and whatever metadata L1 pattern rules want to reconstruct themselves
    - dry_run of 'ls && rm -rf /' does NOT return allow L1 allow-safe-pipeline; decision is escalate (or deny by a specific rule)
    - dry_run of 'cat /etc/passwd > /tmp/stolen' does NOT return allow L1; escalates
    - dry_run of 'ls $(rm -rf /)' does NOT return allow L1; escalates
    - dry_run of 'ls `rm -rf /`' does NOT return allow L1; escalates
    - 'dry_run of ''echo hello'' (unknown capability) does NOT return allow L1; escalates (or denies with ''unknown capability: echo'')'
    - dry_run of 'git push' (bare, no --force) does NOT return allow L1; escalates
    - dry_run of bare 'ls' escalates unless a specific L1 rule has been added; do NOT add a whitelist to paper over this — L2 learns the pattern after one approval, or L3 reasons about it
    - dry_run of 'git push --force' remains denied by deny-git-push-flags (specific L1 pattern rule, unchanged)
    - dry_run of 'rm -rf /' remains denied by deny-rm-catastrophic (specific L1 pattern rule, unchanged)
    - A regression test suite in internal/policy/level1_test.go exercises every bypass listed above (&&, ||, ;, |, >, <, $(...), backticks, process substitution, echo, bare git push) and confirms none return 'allow L1 allow-safe-pipeline'
    - 'STABILITY.md is updated: the audit-log ''segments''/''tiers'' fields are documented as deprecated or empty post-T17 (they can remain in the schema for backwards compatibility but no new entries populate them)'
    context: |-
      **Architectural shift, not a bug fix.** The pre-v0.5.0 design assumed doit would tokenise commands into Pipeline → Segments and make tier-based decisions per segment. v0.5.0 removed the pipeline parser (commit f3d5a2d) and delegated shell composition to `sh -c`, but left behind three vestigial structures that don't survive the shift:

        1. `internal/policy/level1.go:251-266 checkSafePipeline` — iterates `req.Segments` and auto-allows if every segment is TierRead. Under v0.5.0, `req.Segments` is always length 1 (just `args[0]`), so "all segments are read-only" is vacuously true for any first-word-read-tier command.
        2. `engine/engine.go evaluatePolicy` — constructs a single synthetic `policy.Segment{CapName, Args, Tier}` from `args[0]` and the capability registry. This is engine-level tokenisation pretending to be segment analysis.
        3. `policy.Segment.Tier` threading through L1/L2 — every policy layer consumes a "tier" per segment, which is now just "tier of the first word".

      Why can't we fix this by parsing pipelines properly?

        - Process substitution: `diff <(sort a) <(sort b)` — nested pipelines inside `<(...)` that share no structure with the outer command.
        - Here-strings and here-docs: `cat <<< "data"`, `cat <<EOF\n...\nEOF`.
        - `eval "rm -rf $VAR"` — the actual command is only constructed at runtime.
        - `sh -c 'nested; composition'` — quoted shell passed as an argument to another shell.
        - `$IFS` / `noglob` / readonly arrays — word-splitting rules that change per-shell.
        - Function and alias expansion.
        - Multi-line commands embedded in `$(...)`.

      Only `bash` itself gets this right, and by the time you've invoked bash you're already running the command. Any parser doit embeds is a strictly weaker model of bash, and the gap is where the bypasses live.

      The right move: **stop trying to parse.** The engine treats `req.Command` as an opaque string and hands it to the policy chain. Each layer decides how much of the string it wants to inspect:

        - **L1**: pattern rules (Starlark or Go) that match the full command string against specific known-good or known-bad forms. `deny-rm-catastrophic`, `deny-git-push-flags`, `deny-git-reset-hard`, etc. These are *specific* patterns, not tier-based reasoning — they pattern-match the raw command string and return Allow/Deny/Escalate. Anything that doesn't match any L1 rule falls through.
        - **L2**: learned patterns — already works this way. Matches against the full command string.
        - **L3**: LLM reasons about the full command string in context. Already works this way.

      **No whitelist.** The user explicitly rejected the "small Starlark whitelist for safe single-command forms" approach. Commands that don't match a specific deny rule escalate. L2 learns them after one approval; L3 reasons about novel ones. Cold-start latency is real but correctness matters more than an extra `claude -p` call on the first `ls`.

      Concrete code changes:
        - Delete `checkSafePipeline` and its `allow-safe-pipeline` rule registration in `Level1.NewLevel1`.
        - Delete `allow-safe-pipeline` references in `level1_test.go`. Keep the positive test cases for specific deny rules.
        - `engine.evaluatePolicy`: stop constructing `policy.Segment`; pass `policy.Request{Command: req.Command}` through the chain. If L1 rules still want a capability-name hint they can parse it themselves from the first word.
        - `policy.Request.Segments` and `policy.Segment.Tier`: remove from the public policy API or mark deprecated. Update L1 pattern rules that read them to either scan the command string directly or read the first word.
        - `audit.Entry.Segments`/`Tiers`: stop populating from new writes. Either drop the fields or let them always be empty. STABILITY.md notes the change.

      This change subsumes 🎯T18 (redirects), 🎯T19 (command substitution), 🎯T23 (unknown-cap TierRead default), and 🎯T24 (capability Validate metacharacter rejection) — all four were symptoms of the same underlying "engine is parsing" mistake. They are retired as part of this reshape.

      🎯T20 (per-subcommand tier) also collapses into this, but slightly differently — see T20.

      Tags: security, architecture, critical, bypass
    tags:
    - security
    - parser
    - critical
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
  T18:
    name: Output redirection (&gt;, &gt;&gt;, &amp;&gt;) is recognized as a write operation
    status: achieved
    value: 13.0
    cost: 3.0
    acceptance:
    - dry_run of 'cat /etc/passwd > /tmp/stolen' requires TierWrite
    - dry_run of 'ls >> log.txt' requires TierWrite
    - dry_run of 'cmd &> log' requires TierWrite
    - A test case covers each redirect form
    context: |-
      Subsumed by 🎯T17. Output redirection (`>`, `>>`, `&>`) is a shell metacharacter that the v0.5.0 engine cannot reason about — the correct behaviour is to refuse the L1 auto-allow and escalate to L2/L3, exactly as T17 prescribes. The original framing (enforce TierWrite on redirects) predates the pipeline-parser removal and is no longer the right shape.

      Keep this target as a verify-level check that once T17 lands, the specific redirect forms are denied: `cat /etc/passwd > /tmp/stolen`, `ls >> log.txt`, `cmd &> log`. If T17's regression suite already covers these, this target can be retired.
    depends_on:
    - T17
    tags:
    - security
    - parser
    - critical
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
    achieved: 2026-04-12
  T19:
    name: Command substitution ($(...) and backticks) is rejected or parsed recursively
    status: achieved
    value: 13.0
    cost: 5.0
    acceptance:
    - dry_run of 'ls $(rm -rf /)' is denied or the rm segment is seen and denied
    - dry_run of 'ls `rm -rf /`' is denied or the rm segment is seen and denied
    - Quoted substitutions inside strings are handled correctly
    - Variable expansion in argument positions ($PWD, ${HOME}) remains allowed
    context: |-
      Subsumed by 🎯T17. Command substitution (`$(...)`, backticks) is a shell metacharacter that the v0.5.0 engine cannot reason about. The T17 fix — reject L1 auto-allow on any unparsed metacharacter — closes this bypass as a side effect. If T17's acceptance tests cover `$(...)` and backtick forms, this target can be retired.

      The "stronger fix: recursively parse substitution bodies" path from the original context is rejected — it would re-introduce a parser, which v0.5.0 deliberately removed.
    depends_on:
    - T17
    tags:
    - security
    - parser
    - critical
    origin: discovered during doit experimentation session 2026-04-11
    discovered: 2026-04-11
    achieved: 2026-04-12
